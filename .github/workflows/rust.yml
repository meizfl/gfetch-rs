name: Rust
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
env:
  CARGO_TERM_COLOR: always
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
       sudo apt-get update
        sudo apt-get install -y \
          libxcb1-dev \
          libxcb-shm0-dev \
          libxcb-randr0-dev \
          libxcb-xfixes0-dev \
          libx11-dev \
          libwayland-dev \
          libpipewire-0.3-dev \
          libspa-0.2-dev \
          pkg-config \
          xvfb
          
    - name: Build
      run: |
        export DISPLAY=:99
        Xvfb :99 -screen 0 1920x1080x24 &
        cargo build --verbose

    - name: Run tests
      run: cargo test --verbose
