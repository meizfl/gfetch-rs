name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Linux зависимости
      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev \
            libxcb-shm0-dev \
            libxcb-randr0-dev \
            libxcb-xfixes0-dev \
            libx11-dev \
            libwayland-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            libegl1-mesa-dev \
            libgbm-dev \
            pkg-config \
            xvfb

      # Запуск Xvfb только на Linux
      - name: Build (Linux with Xvfb)
        if: matrix.os == 'ubuntu-latest'
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1920x1080x24 &
          cargo build --verbose

      # Обычный билд для остальных
      - name: Build (non-Linux)
        if: matrix.os != 'ubuntu-latest'
        run: cargo build --verbose

      - name: Run tests
        run: cargo run

      - name: Upload binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: gfetch-${{ matrix.os }}
          path: target/debug/gfetch-rs

      - name: Upload binary (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: gfetch-${{ matrix.os }}
          path: target/debug/gfetch-rs.exe
